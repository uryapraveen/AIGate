<html>

<head>
    <meta charset="UTF-8">
    <title>Gate Prepare</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form>
        <h1>Gate Planner</h1>
        <label for="subject">Subject:</label>
        <select id="subject" name="subject">
            <option value="">--Select--</option>
            <option value="Em">Engineering Mathematics </option>
            <option value="Dl">Digital Logic</option>
            <option value="COA">Computer Organization and Architecture</option>
            <option value="DS">Programming and Data Structures</option>
            <option value="Algorithms">Algorithms</option>
            <option value="TOC">Theory of Computation</option>
            <option value="CD">Compiler Design</option>
            <option value="OS">Operating System</option>
            <option value="Databases">Databases</option>
            <option value="CN"> Computer Networks</option>
        </select>
        <label for="topic">Topic:</label>
        <input id="topic" name="topic" placeholder="Enter Your Topic" type="text" required>
        <label for="score">Score:</label>
        <input id="score" type="number" name="score" placeholder="Score" required>
        <label for="question">Total Questions</label>
        <input id="question" name="question" type="number" placeholder="Number of Questions" required>
        <label for="date">Date</label>
        <input type="date" id="date" name="date" placeholder="Date">
        <button type="submit" class="Submit">Log Score</button>
    </form>
    <div class="history">
        <h2>Logged Entries</h2>
        <ul id="entriesList"></ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
